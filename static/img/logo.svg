<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Background Radial Gradient -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.6" />
      <stop offset="60%" stop-color="#8b5cf6" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#0B0F19" stop-opacity="0" />
    </radialGradient>
    
    <!-- Linear Gradient for Portal Ring -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <!-- Linear Gradient for Vanishing Lines -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.1" />
    </linearGradient>
  </defs>

  <!-- Outer Glow -->
  <circle cx="50" cy="50" r="45" fill="url(#glow)" />

  <!-- Perspective Vanishing Lines (Narrative Rules converging) -->
  <g stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.7">
    <line x1="50" y1="50" x2="10" y2="10" />
    <line x1="50" y1="50" x2="90" y2="10" />
    <line x1="50" y1="50" x2="10" y2="90" />
    <line x1="50" y1="50" x2="90" y2="90" />
    <line x1="50" y1="50" x2="50" y2="5" />
    <line x1="50" y1="50" x2="50" y2="95" />
    <line x1="50" y1="50" x2="5" y2="50" />
    <line x1="50" y1="50" x2="95" y2="50" />
  </g>

  <!-- Concentric Portal Rings (The Engine Layers) -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="url(#ringGrad)" stroke-width="1" opacity="0.3" stroke-dasharray="4 4" />
  <circle cx="50" cy="50" r="22" fill="none" stroke="url(#ringGrad)" stroke-width="2" opacity="0.6" />
  
  <!-- Outer Solid Ring with Gap (representing a glitch or opening) -->
  <path d="M 50 15 A 35 35 0 1 1 49.9 15" fill="none" stroke="url(#ringGrad)" stroke-width="3" stroke-linecap="round" stroke-dasharray="160 50" />

  <!-- Vanishing Point Core (The glowing source) -->
  <circle cx="50" cy="50" r="6" fill="#ffffff" />
  <circle cx="50" cy="50" r="10" fill="#06b6d4" opacity="0.4" />
  
  <!-- Glitch V Symbol (representing Vanish / 消失) -->
  <path d="M 38 42 L 50 58 L 62 42" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
</svg>